<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRiX Meeting Intelligence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background: #0F1B2D; }
    input::placeholder { color: #64748B; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;
    const C = {
      navy:"#0F1B2D",deep:"#1A3A5C",teal:"#0EA5E9",cyan:"#22D3EE",
      white:"#FFFFFF",off:"#F0F4F8",mgray:"#94A3B8",
      dark:"#1E293B",body:"#334155",amber:"#F59E0B",green:"#10B981",red:"#EF4444",
    };
    const PERSONAS = [
      {id:"economic",label:"Economic Buyer",ex:"CFO, VP Finance, COO",color:C.amber,icon:"\u{1F4B0}"},
      {id:"technical",label:"Technical Evaluator",ex:"CISO, CTO, IT Director",color:C.teal,icon:"\u{1F527}"},
      {id:"champion",label:"Business Champion",ex:"VP of IT, LOB Leader",color:C.green,icon:"\u{1F3AF}"},
    ];
    const TABS = [
      {key:"gen1", label:"1st Meeting", sub:"Without TDE", color:C.mgray, stage:"first", tde:false},
      {key:"tde1", label:"1st Meeting", sub:"With TDE", color:C.cyan, stage:"first", tde:true},
      {key:"gen2", label:"Final Decision", sub:"Without TDE", color:C.mgray, stage:"final", tde:false},
      {key:"tde2", label:"Final Decision", sub:"With TDE", color:C.cyan, stage:"final", tde:true},
    ];
    const Pill = ({color, children}) => (
      <span style={{padding:"2px 9px",borderRadius:10,background:`${color}18`,color,fontSize:10,fontWeight:600}}>{children}</span>
    );

    function App() {
      const [customer, setCustomer] = useState("");
      const [solution, setSolution] = useState("");
      const [selected, setSelected] = useState([]);
      const [details, setDetails] = useState({});
      const [results, setResults] = useState({});
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState("gen1");
      const [dragIdx, setDragIdx] = useState(null);

      const updateDetail = (pid,f,v) => { setDetails(p=>({...p,[pid]:{...(p[pid]||{}),[f]:v}})); setResults({}); };
      const toggle = (id) => { setSelected(p=>p.includes(id)?p.filter(x=>x!==id):p.length>=3?p:[...p,id]); setResults({}); };
      const move = (from,to) => { setSelected(p=>{const n=[...p];const[m]=n.splice(from,1);n.splice(to,0,m);return n;}); setResults({}); };
      const pColor = (label) => {
        if(!label) return C.mgray;
        const l=label.toLowerCase();
        return l.includes("cfo")||l.includes("finance")||l.includes("economic")?C.amber
          :l.includes("ciso")||l.includes("cto")||l.includes("technical")||l.includes("it dir")?C.teal
          :l.includes("champion")||l.includes("business")||l.includes("vp")?C.green:C.mgray;
      };

      const buildAttendeeList = () => selected.map(id => {
        const p = PERSONAS.find(x=>x.id===id);
        const d = details[id]||{};
        const title = d.title||p.ex.split(",")[0].trim();
        return { name: d.name||title, title, company: customer, email:d.email||null, linkedin:d.linkedin||null };
      });

      const generate = useCallback(async () => {
        if (!customer||!solution||selected.length===0) return;
        setLoading(true); setResults({});

        const attendees = buildAttendeeList();
        const roleList = attendees.map((a,i) => `${a.title} at ${customer}`).join(", ");

        // Build all 4 calls
        const calls = TABS.map(tab => {
          if (tab.tde) {
            // TDE call — full context, explicit stage
            return fetch("/api/meeting", {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({
                attendees, solution,
                meetingType: tab.stage==="first"?"discovery":"negotiation",
                company: customer,
                notes: `Stage: ${tab.stage==="first"?"First meeting — discovery":"Final decision — closing"}. Priority: ${selected.map((id,i)=>`#${i+1} ${PERSONAS.find(x=>x.id===id)?.ex.split(",")[0].trim()}`).join(", ")}`,
              }),
            }).then(r => r.ok ? r.json() : r.text().then(t => { throw new Error(t.slice(0,300)); }))
              .then(data => ({type:"brain", data, cached:data._cached}))
              .catch(e => ({type:"error", error:e.message}));
          } else {
            // Generic call — how a normal person would prompt. No stage emphasis.
            const prompt = tab.stage==="first"
              ? `I have a meeting coming up with ${roleList}. We're selling ${solution}. Help me prepare. What should I cover? What questions should I ask? What should I watch out for?\n\nReturn as JSON: {"title":"...","sections":[{"heading":"Section","targetPersona":"who","subs":[{"point":"Sub","details":["Detail"]}]}]}\n5-7 sections. JSON only.`
              : `I have a meeting with ${roleList}. We've been through the sales process and they're making their final decision on ${solution}. Help me prepare for this meeting.\n\nReturn as JSON: {"title":"...","sections":[{"heading":"Section","targetPersona":"who","subs":[{"point":"Sub","details":["Detail"]}]}]}\n5-7 sections. JSON only.`;
            return fetch("/api/generic", {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({prompt}),
            }).then(r => r.ok ? r.json() : r.text().then(t => { throw new Error(t.slice(0,300)); }))
              .then(data => ({type:"generic", data}))
              .catch(e => ({type:"error", error:e.message}));
          }
        });

        // Fire all 4 in parallel, update as each completes
        calls.forEach((call, i) => {
          call.then(result => {
            setResults(prev => ({...prev, [TABS[i].key]: result}));
          });
        });

        // Wait for all to finish
        await Promise.allSettled(calls);
        setLoading(false);
      }, [customer, solution, selected, details]);

      // ── Render TDE result ──
      const renderBrain = (data) => {
        const synth = data.solutionIntersection;
        const group = data.groupDynamics;
        return (
          <div>
            {synth?.executiveSummary && (
              <div style={{background:C.off,borderRadius:10,padding:"14px 18px",borderLeft:`4px solid ${C.cyan}`,marginBottom:16}}>
                <div style={{fontSize:10,fontWeight:700,color:C.cyan,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Executive Summary</div>
                <div style={{fontSize:14,color:C.dark,lineHeight:1.5}}>{synth.executiveSummary}</div>
              </div>
            )}
            {group?.powerMap && (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:6}}>Power Map</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {group.powerMap.decisionMaker && <Pill color={C.amber}>Decision: {group.powerMap.decisionMaker}</Pill>}
                  {group.powerMap.champions?.map((c,i)=><Pill key={"c"+i} color={C.green}>Champion: {c}</Pill>)}
                  {group.powerMap.blockers?.map((b,i)=><Pill key={"b"+i} color={C.red}>Blocker: {b}</Pill>)}
                  {group.powerMap.influencers?.map((f,i)=><Pill key={"i"+i} color={C.teal}>Influencer: {f}</Pill>)}
                </div>
              </div>
            )}
            {group?.sequencing && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                {[["openWith","Open With",C.green],["buildMomentum","Build Momentum",C.teal],["neutralize","Neutralize",C.amber],["close","Close",C.cyan]].map(([k,l,col])=>(
                  group.sequencing[k] ? <div key={k} style={{background:C.off,borderRadius:8,padding:"10px 14px",borderLeft:`4px solid ${col}`}}>
                    <div style={{fontSize:10,fontWeight:700,color:col,textTransform:"uppercase",marginBottom:3}}>{l}</div>
                    <div style={{fontSize:12,color:C.body,lineHeight:1.45}}>{group.sequencing[k]}</div>
                  </div> : null
                ))}
              </div>
            )}
            {synth?.perPerson?.map((pp,i) => (
              <div key={i} style={{background:C.off,borderRadius:10,padding:"14px 18px",borderLeft:`4px solid ${pColor(pp.name)}`,marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:C.dark,marginBottom:4}}>{pp.name}</div>
                <div style={{fontSize:12,color:C.body,marginBottom:6}}>{pp.messagingAngle}</div>
                {pp.relevantPainPoints?.length>0 && (
                  <div style={{marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:C.red}}>Pain: </span><span style={{fontSize:11,color:C.body}}>{pp.relevantPainPoints.join(" · ")}</span></div>
                )}
                {pp.objections?.slice(0,2).map((obj,j)=>(
                  <div key={j} style={{fontSize:11,color:C.body,marginBottom:4,paddingLeft:12,borderLeft:`3px solid ${C.red}20`}}>
                    <span style={{fontWeight:600}}>Objection: </span>{obj.objection}<br/>
                    <span style={{color:C.green,fontWeight:600}}>→ </span>{obj.response}
                  </div>
                ))}
              </div>
            ))}
            {synth?.meetingScript && (
              <div style={{marginTop:14}}>
                <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:8}}>Meeting Script</div>
                {synth.meetingScript.opening && <div style={{fontSize:12,color:C.body,marginBottom:8,paddingLeft:12,borderLeft:`3px solid ${C.green}`}}><span style={{fontWeight:700,color:C.green}}>Open: </span>{synth.meetingScript.opening}</div>}
                {synth.meetingScript.assignments?.map((a,i)=>(
                  <div key={i} style={{fontSize:12,color:C.body,marginBottom:6,paddingLeft:12,borderLeft:`3px solid ${pColor(a.directedAt)}30`}}>
                    <span style={{fontWeight:600}}>{a.topic}</span> → <span style={{color:pColor(a.directedAt),fontWeight:600}}>{a.directedAt}</span>
                    <div style={{fontSize:10,color:C.mgray}}>{a.why}</div>
                  </div>
                ))}
                {synth.meetingScript.closingMove && <div style={{fontSize:12,color:C.body,paddingLeft:12,borderLeft:`3px solid ${C.amber}`}}><span style={{fontWeight:700,color:C.amber}}>Close: </span>{synth.meetingScript.closingMove}</div>}
              </div>
            )}
            {group?.landmines?.length>0 && (
              <div style={{background:"#FEF2F2",borderRadius:8,padding:"10px 14px",borderLeft:`4px solid ${C.red}`,marginTop:14}}>
                <div style={{fontSize:10,fontWeight:700,color:C.red,textTransform:"uppercase",marginBottom:4}}>Landmines</div>
                {group.landmines.map((lm,i)=><div key={i} style={{fontSize:11,color:C.body,marginBottom:2}}>· {lm}</div>)}
              </div>
            )}
            {(group?.roomEnergy||group?.winCondition) && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}}>
                {group.roomEnergy && <div style={{background:C.off,borderRadius:8,padding:"10px 14px",borderLeft:`4px solid ${C.amber}`}}><div style={{fontSize:10,fontWeight:700,color:C.amber,textTransform:"uppercase",marginBottom:3}}>Room Energy</div><div style={{fontSize:12,color:C.body}}>{group.roomEnergy}</div></div>}
                {group.winCondition && <div style={{background:C.off,borderRadius:8,padding:"10px 14px",borderLeft:`4px solid ${C.green}`}}><div style={{fontSize:10,fontWeight:700,color:C.green,textTransform:"uppercase",marginBottom:3}}>Win Condition</div><div style={{fontSize:12,color:C.body}}>{group.winCondition}</div></div>}
              </div>
            )}
            {synth?.dealKillers?.length>0 && (
              <div style={{background:"#FEF2F2",borderRadius:8,padding:"10px 14px",borderLeft:`4px solid ${C.red}`,marginTop:12}}>
                <div style={{fontSize:10,fontWeight:700,color:C.red,textTransform:"uppercase",marginBottom:4}}>Deal Killers</div>
                {synth.dealKillers.map((dk,i)=><div key={i} style={{fontSize:11,color:C.body,marginBottom:2}}>· {dk}</div>)}
              </div>
            )}
            <div style={{display:"flex",gap:6,marginTop:14,justifyContent:"flex-end"}}>
              {data.pipelineTimeMs && <Pill color={C.mgray}>{(data.pipelineTimeMs/1000).toFixed(1)}s</Pill>}
              {data.totalAtoms>0 && <Pill color={C.cyan}>{data.totalAtoms} atoms</Pill>}
              <Pill color={data._cached?C.green:C.teal}>{data._cached?"Cached":"Live"}</Pill>
            </div>
          </div>
        );
      };

      // ── Render generic outline ──
      const renderGeneric = (data) => (
        <div>
          {data.sections?.map((sec,i) => (
            <div key={i} style={{marginBottom:i<data.sections.length-1?14:0}}>
              <div style={{display:"flex",gap:10,marginBottom:6}}>
                <div style={{minWidth:28,height:28,borderRadius:6,background:C.navy,color:C.cyan,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>
                  {["I","II","III","IV","V","VI","VII"][i]||(i+1)}
                </div>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:C.dark}}>{sec.heading?.replace(/^[IVX]+\.\s*/,"")}</div>
                  {sec.targetPersona && <span style={{fontSize:10,color:pColor(sec.targetPersona),fontWeight:600}}>→ {sec.targetPersona}</span>}
                </div>
              </div>
              <div style={{marginLeft:38}}>
                {sec.subs?.map((sub,j) => (
                  <div key={j} style={{marginBottom:6}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.dark,borderLeft:`3px solid ${pColor(sec.targetPersona)}30`,paddingLeft:10,marginBottom:2}}>
                      {sub.point?.replace(/^[A-C]\.\s*/,"")}
                    </div>
                    {sub.details?.map((det,k) => (
                      <div key={k} style={{fontSize:11,color:C.body,paddingLeft:22,position:"relative",marginBottom:1}}>
                        <span style={{position:"absolute",left:10,color:C.mgray}}>·</span>
                        {det.replace(/^\d+\.\s*/,"")}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
              {i<data.sections.length-1 && <div style={{height:1,background:"#E2E8F0",marginTop:4}}/>}
            </div>
          ))}
        </div>
      );

      const activeResult = results[activeTab];

      return (
        <div style={{minHeight:"100vh",background:C.navy,color:C.white}}>
          {/* Header */}
          <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.deep}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:22,fontWeight:800}}>
              DR<span style={{color:C.cyan,fontStyle:"italic"}}>i</span>X
              <span style={{color:C.mgray,fontWeight:400,fontSize:14,marginLeft:12}}>Meeting Intelligence</span>
            </div>
            <div style={{fontSize:11,color:C.mgray,textTransform:"uppercase",letterSpacing:1.5}}>Demo</div>
          </div>

          {/* Inputs */}
          <div style={{padding:"20px 28px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
              {[["Customer",customer,setCustomer,"e.g. Acme Corp"],["Solution",solution,setSolution,"e.g. Managed Detection & Response"]].map(([lbl,val,set,ph])=>(
                <div key={lbl}>
                  <label style={{fontSize:10,fontWeight:600,color:C.mgray,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:5}}>{lbl}</label>
                  <input value={val} onChange={e=>{set(e.target.value);setResults({});}} placeholder={ph}
                    style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`1px solid ${C.deep}`,background:C.deep,color:C.white,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>

            <label style={{fontSize:10,fontWeight:600,color:C.mgray,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:8}}>Who is in the meeting?</label>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {PERSONAS.map(p=>{
                const sel=selected.includes(p.id);
                const ord=selected.indexOf(p.id);
                return (
                  <button key={p.id} onClick={()=>toggle(p.id)}
                    style={{flex:1,padding:"12px 14px",borderRadius:10,border:sel?`2px solid ${p.color}`:`1px solid ${C.deep}`,background:sel?`${p.color}12`:C.deep,cursor:"pointer",textAlign:"left",position:"relative"}}>
                    {sel && <div style={{position:"absolute",top:-8,right:-8,width:22,height:22,borderRadius:"50%",background:p.color,color:C.navy,fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{ord+1}</div>}
                    <div style={{fontSize:18,marginBottom:4}}>{p.icon}</div>
                    <div style={{fontSize:13,fontWeight:700,color:sel?p.color:C.white}}>{p.label}</div>
                    <div style={{fontSize:11,color:C.mgray}}>{p.ex}</div>
                  </button>
                );
              })}
            </div>

            {selected.length>0 && (
              <div style={{background:`${C.cyan}06`,border:`1px solid ${C.cyan}15`,borderRadius:8,padding:"12px 16px",marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:C.cyan,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Attendee Details (optional)</div>
                {selected.map(id=>{
                  const p=PERSONAS.find(x=>x.id===id);
                  const d=details[id]||{};
                  return (
                    <div key={id} style={{display:"flex",gap:8,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontSize:11,fontWeight:600,color:p.color,minWidth:65}}>{p.icon} {p.ex.split(",")[0].trim()}</span>
                      {[["name","Full name"],["title","Title"],["email","Email"],["linkedin","LinkedIn URL"]].map(([f,ph])=>(
                        <input key={f} value={d[f]||""} onChange={e=>updateDetail(id,f,e.target.value)} placeholder={ph}
                          style={{flex:1,minWidth:120,padding:"6px 10px",borderRadius:6,border:`1px solid ${C.cyan}20`,background:C.navy,color:C.white,fontSize:11,outline:"none",boxSizing:"border-box"}}/>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            {selected.length>1 && (
              <div style={{background:C.deep,borderRadius:8,padding:"9px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:10,color:C.mgray}}>Priority:</span>
                <div style={{display:"flex",gap:6,flex:1}}>
                  {selected.map((id,idx)=>{
                    const p=PERSONAS.find(x=>x.id===id);
                    return (
                      <div key={id} draggable onDragStart={()=>setDragIdx(idx)} onDragOver={e=>e.preventDefault()}
                        onDrop={()=>{if(dragIdx!==null&&dragIdx!==idx)move(dragIdx,idx);setDragIdx(null);}}
                        style={{padding:"5px 12px",borderRadius:6,background:`${p.color}20`,border:`1px solid ${p.color}40`,color:p.color,fontSize:11,fontWeight:600,cursor:"grab",userSelect:"none"}}>
                        #{idx+1} {p.ex.split(",")[0].trim()}
                      </div>
                    );
                  })}
                </div>
                <span style={{fontSize:9,color:C.mgray}}>drag to reorder</span>
              </div>
            )}

            <button onClick={generate} disabled={!customer||!solution||selected.length===0||loading}
              style={{width:"100%",padding:"13px",borderRadius:8,border:"none",background:!customer||!solution||selected.length===0?C.deep:C.cyan,color:C.white,fontSize:14,fontWeight:700,cursor:!customer||!solution||selected.length===0?"not-allowed":"pointer",opacity:!customer||!solution||selected.length===0?0.5:1}}>
              {loading?"Running 4 analyses in parallel...":"Generate All Scenarios"}
            </button>
          </div>

          {/* Results */}
          {Object.keys(results).length > 0 && (
            <div style={{padding:"0 28px 28px"}}>
              {/* Tabs */}
              <div style={{display:"flex",borderBottom:`2px solid ${C.deep}`}}>
                {TABS.map(tab => {
                  const hasResult = !!results[tab.key];
                  const isActive = activeTab===tab.key;
                  const isError = results[tab.key]?.type==="error";
                  return (
                    <button key={tab.key} onClick={()=>setActiveTab(tab.key)}
                      style={{flex:1,padding:"10px 8px",border:"none",borderBottom:isActive?`2px solid ${tab.color}`:"2px solid transparent",background:"transparent",cursor:"pointer",marginBottom:-2,textAlign:"center"}}>
                      <div style={{fontSize:12,fontWeight:isActive?700:400,color:isActive?tab.color:C.mgray}}>{tab.label}</div>
                      <div style={{fontSize:9,color:isActive?tab.color:C.mgray,opacity:0.7,marginTop:1}}>
                        {tab.sub}
                        {!hasResult && loading ? " ⏳" : ""}
                        {isError ? " ❌" : ""}
                        {hasResult && !isError ? " ✓" : ""}
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* Content */}
              <div style={{background:C.white,borderRadius:"0 0 10px 10px",padding:"20px 24px",minHeight:200}}>
                {!activeResult && loading && (
                  <div style={{textAlign:"center",padding:"40px 0"}}>
                    <div style={{fontSize:13,color:C.teal,marginBottom:10}}>Loading...</div>
                    <div style={{width:150,height:3,background:"#E2E8F0",borderRadius:2,margin:"0 auto",overflow:"hidden"}}>
                      <div style={{width:"40%",height:"100%",background:C.cyan,borderRadius:2,animation:"ld 1.5s ease-in-out infinite"}}/>
                    </div>
                    <style>{`@keyframes ld{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}`}</style>
                  </div>
                )}
                {activeResult?.type==="error" && (
                  <div style={{padding:14,background:"#FEF2F2",borderRadius:8,color:C.red,fontSize:12,wordBreak:"break-word"}}>{activeResult.error}</div>
                )}
                {activeResult?.type==="brain" && renderBrain(activeResult.data)}
                {activeResult?.type==="generic" && renderGeneric(activeResult.data)}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
